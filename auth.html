<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ninebot WebBLE Clean Crypto Test</title>
<script src="https://cdn.jsdelivr.net/npm/aes-js@3.1.2/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/js-sha1@0.7.0/src/sha1.min.js"></script>
<style>
body{font-family:system-ui,Arial,sans-serif;background:#0b0d10;color:#e8eef5;margin:0;padding:20px}.wrap{max-width:1120px;margin:auto}.card{background:#151a21;border:1px solid #2a3340;border-radius:14px;padding:16px;margin:12px 0}button{background:#2f7df6;color:white;border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;margin:4px}button:disabled{background:#45505f}input{background:#0f1319;color:#e8eef5;border:1px solid #3a4554;border-radius:10px;padding:10px;min-width:280px}pre{background:#07090c;border:1px solid #242b35;border-radius:12px;padding:12px;overflow:auto;height:540px;white-space:pre-wrap}.row{display:flex;flex-wrap:wrap;gap:10px;align-items:center}.status{font-weight:700;color:#9fe870}.warn{color:#ffd166}code{font-family:ui-monospace,Consolas,monospace}
</style>
</head>
<body>
<div class="wrap">
<h1>Ninebot WebBLE Clean Crypto Test <small>v1-clean</small></h1>
<div class="card">
  <div class="row">
    <label>Scooter BLE Name für Key:</label>
    <input id="nameInput" placeholder="leer = ausgewählter BLE-Name" />
    <button id="connectBtn">Device auswählen & connecten</button>
    <button id="sendFirstBtn" disabled>Send First/Auth Init</button>
    <button id="sendAppRandomBtn" disabled>Send App Random Auth</button>
    <button id="clearBtn">Clear Log</button>
  </div>
  <p>Status: <span id="status" class="status">idle</span></p>
  <p class="warn">Clean-Port vom NinebotCrypto-Prinzip: SHA1-KeySchedule + AES-ECB-Keystream-XOR + CRC/MAC + msg counter.</p>
</div>
<div class="card">
  <h3>State</h3>
  <div>Device: <code id="deviceName">-</code></div>
  <div>Key-Name: <code id="keyNameOut">-</code></div>
  <div>Serial: <code id="serialOut">-</code></div>
  <div>Auth: <code id="authOut">not started</code></div>
  <div>TX msgIt: <code id="txMsgOut">0</code></div>
  <div>RX msgIt: <code id="rxMsgOut">0</code></div>
</div>
<div class="card"><h3>Log</h3><pre id="log"></pre></div>
</div>
<script>
'use strict';

const NUS_SERVICE = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
const NUS_WRITE   = '6e400002-b5a3-f393-e0a9-e50e24dcca9e';
const NUS_NOTIFY  = '6e400003-b5a3-f393-e0a9-e50e24dcca9e';

const FW_DATA = bytes('97 cf b8 02 84 41 43 de 56 00 2b 3b 34 78 0a 5d');
const FIRST_AUTH_PLAIN = bytes('5a a5 00 e5 d8 1f 32');
const SHU_FIRST_AUTH_RAW = bytes('5a a5 00 73 a5 da 0b 00 00 62 ff 00 00');

let ble = { device:null, server:null, service:null, tx:null, rx:null };
let cryptoBox = null;
let randomBle = new Uint8Array(16);
let randomApp = new Uint8Array(16);

const $ = id => document.getElementById(id);
function setStatus(s){ $('status').textContent=s; }
function setAuth(s){ $('authOut').textContent=s; }
function log(s){ const el=$('log'); el.textContent += s + '\n'; el.scrollTop = el.scrollHeight; }
function bytes(hex){ return new Uint8Array(hex.trim().split(/\s+/).filter(Boolean).map(x=>parseInt(x,16))); }
function hex(buf){ return [...buf].map(b=>b.toString(16).padStart(2,'0')).join(' '); }
function ascii(buf){ return [...buf].map(b=>b>=32&&b<=126?String.fromCharCode(b):'.').join(''); }
function concat(...arrs){ const len=arrs.reduce((n,a)=>n+a.length,0); const out=new Uint8Array(len); let off=0; for(const a of arrs){out.set(a,off); off+=a.length;} return out; }
function name16(name){ const out=new Uint8Array(16); for(let i=0;i<Math.min(16,name.length);i++) out[i]=name.charCodeAt(i)&0xff; return out; }
function sha1First16(data){ return new Uint8Array(sha1.array(data).slice(0,16)); }
function aesEcb16(block16,key16){ return new Uint8Array(new aesjs.ModeOfOperation.ecb([...key16]).encrypt([...block16])); }
function xor16(a,b){ const out=new Uint8Array(16); for(let i=0;i<16;i++) out[i]=(a[i]^b[i])&0xff; return out; }
function startsWith(buf, prefix){ if(!buf || buf.length<prefix.length) return false; for(let i=0;i<prefix.length;i++) if(buf[i]!==prefix[i]) return false; return true; }

class NinebotCryptoClean {
  constructor(deviceName){
    this.name = name16(deviceName);
    this.randomBle = new Uint8Array(16);
    this.randomApp = new Uint8Array(16);
    this.key = sha1First16(concat(this.name, FW_DATA));
    this.txMsgIt = 0;
    this.rxMsgIt = 0;
    this.phase = 'initial';
  }

  logKey(label){ log(`[KEY] ${label}: ${hex(this.key)}`); }

  setBleRandom(rb){
    this.randomBle.set(rb);
    this.key = sha1First16(concat(this.name, this.randomBle));
    this.phase = 'ble-random';
    this.logKey('SHA1(name16 + randomBle)[0:16]');
  }

  setFinalSessionKey(ra=this.randomApp, rb=this.randomBle){
    this.randomApp.set(ra);
    this.randomBle.set(rb);
    this.key = sha1First16(concat(this.randomApp, this.randomBle));
    this.phase = 'session';
    this.logKey('FINAL SHA1(randomApp + randomBle)[0:16]');
  }

  cryptoFirst(data){
    const out = new Uint8Array(data.length);
    const stream = aesEcb16(FW_DATA, this.key);
    for(let off=0; off<data.length; off+=16){
      const n = Math.min(16, data.length-off);
      for(let i=0;i<n;i++) out[off+i] = data[off+i] ^ stream[i];
    }
    return out;
  }

  cryptoNext(data, msgIt){
    const out = new Uint8Array(data.length);
    const block = new Uint8Array(16);
    block[0] = 1;
    block[1] = (msgIt >>> 24) & 0xff;
    block[2] = (msgIt >>> 16) & 0xff;
    block[3] = (msgIt >>> 8) & 0xff;
    block[4] = msgIt & 0xff;
    block.set(this.randomBle.slice(0,8), 5);
    block[15] = 0;

    for(let off=0; off<data.length; off+=16){
      block[15] = (block[15] + 1) & 0xff;
      const stream = aesEcb16(block, this.key);
      const n = Math.min(16, data.length-off);
      for(let i=0;i<n;i++) out[off+i] = data[off+i] ^ stream[i];
    }
    return out;
  }

  calcCrcFirst(payload){
    let crc = 0;
    for(const b of payload) crc = (crc + b) & 0xffff;
    crc = (~crc) & 0xffff;
    return new Uint8Array([crc & 0xff, (crc >>> 8) & 0xff]);
  }

  calcCrcNext(frame, msgIt){
    const payloadLen = frame.length - 3;
    const block = new Uint8Array(16);
    block[0] = 89;
    block[1] = (msgIt >>> 24) & 0xff;
    block[2] = (msgIt >>> 16) & 0xff;
    block[3] = (msgIt >>> 8) & 0xff;
    block[4] = msgIt & 0xff;
    block.set(this.randomBle.slice(0,8), 5);
    block[15] = payloadLen & 0xff;

    let x2 = aesEcb16(block, this.key);
    let x1 = new Uint8Array(16);
    x1.set(frame.slice(0,3));
    x2 = aesEcb16(xor16(x1,x2), this.key);

    let idx = 3;
    let left = payloadLen;
    while(left > 0){
      const n = Math.min(16,left);
      x1 = new Uint8Array(16);
      x1.set(frame.slice(idx, idx+n));
      x2 = aesEcb16(xor16(x1,x2), this.key);
      idx += n;
      left -= n;
    }

    block[0] = 1;
    block[15] = 0;
    return xor16(aesEcb16(block,this.key), x2).slice(0,4);
  }

  encryptPlain(frame){
    const payloadLen = frame.length - 3;
    const plainPayload = frame.slice(3);
    const out = new Uint8Array(payloadLen + 9);
    out.set(frame.slice(0,3), 0);

    if(this.txMsgIt === 0){
      const crc = this.calcCrcFirst(plainPayload);
      const encPayload = this.cryptoFirst(plainPayload);
      out.set(encPayload, 3);
      out[payloadLen+3] = 0;
      out[payloadLen+4] = 0;
      out[payloadLen+5] = crc[0];
      out[payloadLen+6] = crc[1];
      out[payloadLen+7] = 0;
      out[payloadLen+8] = 0;
      this.txMsgIt++;
    } else {
      this.txMsgIt++;
      const crc = this.calcCrcNext(frame, this.txMsgIt);
      const encPayload = this.cryptoNext(plainPayload, this.txMsgIt);
      out.set(encPayload, 3);
      out[payloadLen+3] = crc[0];
      out[payloadLen+4] = crc[1];
      out[payloadLen+5] = crc[2];
      out[payloadLen+6] = crc[3];
      out[payloadLen+7] = (this.txMsgIt >>> 8) & 0xff;
      out[payloadLen+8] = this.txMsgIt & 0xff;
    }

    updateCounters();
    return out;
  }

  decryptRaw(raw){
    if(raw.length < 9) return null;
    const plain = new Uint8Array(raw.length - 6);
    plain.set(raw.slice(0,3), 0);

    let newMsgIt = this.rxMsgIt;
    if((newMsgIt & 0x0008000) > 0 && ((raw[raw.length-2] >>> 7) === 0)) newMsgIt += 0x0010000;
    newMsgIt = (newMsgIt & 0xffff0000) + (raw[raw.length-2] << 8) + raw[raw.length-1];

    let payload = raw.slice(3, raw.length - 6);
    if(newMsgIt === 0){
      payload = this.cryptoFirst(payload);
      plain.set(payload, 3);
    } else if(newMsgIt > this.rxMsgIt){
      payload = this.cryptoNext(payload, newMsgIt);
      plain.set(payload, 3);
      this.rxMsgIt = newMsgIt;
    } else {
      return null;
    }

    updateCounters();
    return plain;
  }
}

function updateCounters(){
  if(!cryptoBox) return;
  $('txMsgOut').textContent = String(cryptoBox.txMsgIt);
  $('rxMsgOut').textContent = String(cryptoBox.rxMsgIt);
}

function parsePlain(frame){
  log(`[RX PLAIN] ${hex(frame)} | ${ascii(frame)}`);

  if(startsWith(frame, bytes('5a a5 1e 21 3e 5b'))){
    const rb = frame.slice(7,23);
    randomBle.set(rb);
    log(`[AUTH] randomBle=${hex(rb)}`);
    cryptoBox.setBleRandom(rb);
    $('sendAppRandomBtn').disabled = false;
    setAuth('challenge received; press power if needed, then send app random');
    return;
  }

  if(startsWith(frame, bytes('5a a5 00 21 3e 5c 01'))){
    cryptoBox.setFinalSessionKey(randomApp, randomBle);
    setAuth('authenticated ✅');
    return;
  }

  if(startsWith(frame, bytes('5a a5 0e 16 3e 04 10'))){
    const serial = ascii(frame.slice(7)).replace(/\.+$/g,'');
    $('serialOut').textContent = serial;
    log(`[SERIAL] ${serial}`);
  }
}

async function writeRaw(raw){
  log(`\n[TX RAW] ${hex(raw)}`);
  try{
    await ble.tx.writeValueWithoutResponse(raw);
    log('[TX OK] writeValueWithoutResponse');
  }catch(e1){
    log(`[TX WARN] withoutResponse failed: ${e1.message}`);
    try{
      await ble.tx.writeValueWithResponse(raw);
      log('[TX OK] writeValueWithResponse');
    }catch(e2){
      log(`[TX WARN] withResponse failed: ${e2.message}`);
      await ble.tx.writeValue(raw);
      log('[TX OK] writeValue fallback');
    }
  }
}

async function sendFirstAuthInit(){
  if(!cryptoBox) return alert('not connected');

  log('\n[TEST] Clean encrypted first packet from FIRST_AUTH_PLAIN:');
  const clean = cryptoBox.encryptPlain(FIRST_AUTH_PLAIN);
  log(`[TX PLAIN FIRST] ${hex(FIRST_AUTH_PLAIN)}`);
  log(`[TX CLEAN ENC ] ${hex(clean)}`);
  log(`[TX SHU RAW   ] ${hex(SHU_FIRST_AUTH_RAW)}`);

  // For now send the known-good SHU first packet. Clean output is logged for comparison.
  await writeRaw(SHU_FIRST_AUTH_RAW);
  setAuth('first auth init sent; waiting for 5B challenge');
}

async function sendAppRandomAuth(){
  if(!cryptoBox) return alert('not connected');
  crypto.getRandomValues(randomApp);
  cryptoBox.randomApp.set(randomApp);
  const plain = new Uint8Array(23);
  plain.set(bytes('5a a5 10 3e 21 5c 00'),0);
  plain.set(randomApp,7);
  log(`\n[AUTH] randomApp=${hex(randomApp)}`);
  log(`[TX PLAIN APP_RANDOM] ${hex(plain)}`);
  const raw = cryptoBox.encryptPlain(plain);
  await writeRaw(raw);
  setAuth('app random sent; waiting 5C 01');
}

async function connect(){
  if(!navigator.bluetooth){ alert('WebBluetooth nicht verfügbar'); return; }
  setStatus('opening chooser...');

  ble.device = await navigator.bluetooth.requestDevice({
    acceptAllDevices: true,
    optionalServices: [NUS_SERVICE]
  });

  const devName = ble.device.name || '';
  const keyName = $('nameInput').value.trim() || devName;
  $('nameInput').value = keyName;
  $('deviceName').textContent = devName || '(no name)';
  $('keyNameOut').textContent = keyName || '(empty)';

  cryptoBox = new NinebotCryptoClean(keyName);
  log(`[BLE] selected=${devName}`);
  log(`[KEY] key-name=${JSON.stringify(keyName)}`);
  cryptoBox.logKey('INITIAL SHA1(name16 + fwData)[0:16]');

  setStatus('connecting...');
  ble.server = await ble.device.gatt.connect();
  ble.service = await ble.server.getPrimaryService(NUS_SERVICE);
  ble.tx = await ble.service.getCharacteristic(NUS_WRITE);
  ble.rx = await ble.service.getCharacteristic(NUS_NOTIFY);

  log(`[BLE] TX props write=${ble.tx.properties.write} writeWithoutResponse=${ble.tx.properties.writeWithoutResponse}`);
  log(`[BLE] RX props notify=${ble.rx.properties.notify} indicate=${ble.rx.properties.indicate}`);

  await ble.rx.startNotifications();
  ble.rx.addEventListener('characteristicvaluechanged', ev => {
    const raw = new Uint8Array(ev.target.value.buffer.slice(0));
    log(`\n[RX RAW] ${hex(raw)}`);
    const plain = cryptoBox.decryptRaw(raw);
    if(plain) parsePlain(plain); else log('[RX PLAIN] <decrypt skipped/stale counter>');
  });

  setStatus('connected');
  $('sendFirstBtn').disabled = false;
  setAuth('connected; click Send First/Auth Init');
}

$('connectBtn').addEventListener('click', () => connect().catch(e => { console.error(e); log(`[ERR] ${e.message}`); setStatus('error'); }));
$('sendFirstBtn').onclick = () => sendFirstAuthInit().catch(e => log(`[ERR] ${e.message}`));
$('sendAppRandomBtn').onclick = () => sendAppRandomAuth().catch(e => log(`[ERR] ${e.message}`));
$('clearBtn').onclick = () => $('log').textContent = '';
</script>
</body>
</html>
