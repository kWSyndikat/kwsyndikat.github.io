<script>
// =================== BLE-UUIDs ===================
const SHU_NRF_SERVICE = "6e400001-b5a3-f393-e0a9-e50e24dcca9e";
const SHU_NRF_CHAR_A  = "6e400002-b5a3-f393-e0a9-e50e24dcca9e"; // write
const SHU_NRF_CHAR_B  = "6e400003-b5a3-f393-e0a9-e50e24dcca9e"; // notify

// =================== Utility ===================
const $ = (id) => document.getElementById(id);

const log = (msg) => {
  const el = $("log");
  el.value += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
  el.scrollTop = el.scrollHeight;
};

const setStatus = (msg, type = "") => {
  const el = $("status");
  el.textContent = msg;
  el.className = "status" + (type ? " " + type : "");
};

function hexToBytes(hex) {
  const clean = (hex || "").replace(/[^0-9a-fA-F]/g, "");
  if (!clean.length) return new Uint8Array();
  if (clean.length % 2) throw new Error("Hex-Länge muss gerade sein");
  const out = new Uint8Array(clean.length / 2);
  for (let i = 0; i < clean.length; i += 2) {
    out[i / 2] = parseInt(clean.slice(i, i + 2), 16);
  }
  return out;
}

function bytesToHex(bs) {
  return Array.from(bs, b => b.toString(16).padStart(2, "0")).join("");
}

function concatBytes(...arrays) {
  const total = arrays.reduce((n, a) => n + a.length, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const a of arrays) {
    out.set(a, off);
    off += a.length;
  }
  return out;
}

function subBytes(arr, start, len) {
  return arr.slice(start, start + len);
}

function equalsBytes(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function setPairingHtml(html, kind = "") {
  const box = $("pairingBox");
  box.className = "pairing-box" + (kind ? " " + kind : "");
  box.innerHTML = html;
}

// =================== CryptoJS Wrapper ===================
function u8ToWordArray(u8) {
  const words = [];
  for (let i = 0; i < u8.length; i += 4) {
    words.push(
      ((u8[i]     || 0) << 24) |
      ((u8[i + 1] || 0) << 16) |
      ((u8[i + 2] || 0) <<  8) |
      ((u8[i + 3] || 0) <<  0)
    );
  }
  return CryptoJS.lib.WordArray.create(words, u8.length);
}

function wordArrayToU8(wordArray) {
  const { words, sigBytes } = wordArray;
  const out = new Uint8Array(sigBytes);
  for (let i = 0; i < sigBytes; i++) {
    out[i] = (words[i >>> 2] >>> (24 - (i % 4) * 8)) & 0xff;
  }
  return out;
}

function aesEcbEncrypt16(data16, key16) {
  if (data16.length !== 16 || key16.length !== 16) {
    throw new Error("AES-ECB-128 erwartet exakt 16 Byte Daten und 16 Byte Key");
  }

  const encrypted = CryptoJS.AES.encrypt(
    u8ToWordArray(data16),
    u8ToWordArray(key16),
    {
      mode: CryptoJS.mode.ECB,
      padding: CryptoJS.pad.NoPadding
    }
  );

  return wordArrayToU8(encrypted.ciphertext);
}

function sha1_32_to_20(data32) {
  if (data32.length !== 32) {
    throw new Error("SHA1 erwartet hier exakt 32 Byte");
  }
  return wordArrayToU8(CryptoJS.SHA1(u8ToWordArray(data32)));
}

// =================== NinebotCrypto JS-Port ===================
// Portiert entlang der hochgeladenen NinebotCrypto.h/.cpp Logik:
// _fw_data, CalcSha1Key, AesEcbEncrypt, Sha1, XOR16,
// CryptoFirst, CryptoNext, CalcCrcFirstMsg, CalcCrcNextMsg,
// Encrypt, Decrypt. :contentReference[oaicite:4]{index=4} :contentReference[oaicite:5]{index=5} :contentReference[oaicite:6]{index=6} :contentReference[oaicite:7]{index=7}
class NinebotCrypto {
  constructor(name) {
    this._fw_data = new Uint8Array([
      0x97, 0xCF, 0xB8, 0x02, 0x84, 0x41, 0x43, 0xDE,
      0x56, 0x00, 0x2B, 0x3B, 0x34, 0x78, 0x0A, 0x5D
    ]);

    this._random_ble_data = new Uint8Array(16);
    this._random_app_data = new Uint8Array(16);
    this._sha1_key = new Uint8Array(16);
    this._name = new Uint8Array(16);
    this._msg_it = 0;

    const nameBytes = new TextEncoder().encode(name || "");
    this._name.fill(0);
    this._name.set(nameBytes.slice(0, 16), 0);

    this._random_ble_data.fill(0);
    this.calcSha1Key(this._name, this._fw_data);
  }

  blockCopy(src, srcOffset, dst, dstOffset, length) {
    if (src.length < srcOffset + length) throw new Error("BlockCopy src out of range");
    if (dst.length < dstOffset + length) throw new Error("BlockCopy dst out of range");
    for (let i = 0; i < length; i++) {
      dst[dstOffset + i] = src[srcOffset + i];
    }
  }

  xor16(a, b) {
    const out = new Uint8Array(16);
    for (let i = 0; i < 16; i++) out[i] = a[i] ^ b[i];
    return out;
  }

  aesEcbEncrypt(data, key) {
    return aesEcbEncrypt16(data, key);
  }

  sha1(data32) {
    return sha1_32_to_20(data32);
  }

  calcSha1Key(data1, data2) {
    const data = new Uint8Array(32);
    this.blockCopy(data1, 0, data, 0, 16);
    this.blockCopy(data2, 0, data, 16, 16);
    const hash = this.sha1(data);
    this.blockCopy(hash, 0, this._sha1_key, 0, 16);
  }

  cryptoFirst(data) {
    const result = new Uint8Array(data.length);
    let payloadLen = data.length;
    let byteIdx = 0;

    while (payloadLen > 0) {
      const tmpLen = payloadLen <= 16 ? payloadLen : 16;

      const xorData1 = new Uint8Array(16);
      xorData1.fill(0);
      this.blockCopy(data, byteIdx, xorData1, 0, tmpLen);

      const aesKey = this.aesEcbEncrypt(this._fw_data, this._sha1_key);
      const xorData2 = new Uint8Array(16);
      this.blockCopy(aesKey, 0, xorData2, 0, 16);

      const xorData = this.xor16(xorData1, xorData2);
      this.blockCopy(xorData, 0, result, byteIdx, tmpLen);

      payloadLen -= tmpLen;
      byteIdx += tmpLen;
    }

    return result;
  }

  cryptoNext(data, msgIt) {
    const result = new Uint8Array(data.length);

    const aesEncData = new Uint8Array(16);
    aesEncData.fill(0);
    aesEncData[0] = 1;
    aesEncData[1] = (msgIt >>> 24) & 0xff;
    aesEncData[2] = (msgIt >>> 16) & 0xff;
    aesEncData[3] = (msgIt >>>  8) & 0xff;
    aesEncData[4] = (msgIt >>>  0) & 0xff;
    this.blockCopy(this._random_ble_data, 0, aesEncData, 5, 8);
    aesEncData[15] = 0;

    let payloadLen = data.length;
    let byteIdx = 0;

    while (payloadLen > 0) {
      aesEncData[15] = (aesEncData[15] + 1) & 0xff;
      const tmpLen = payloadLen <= 16 ? payloadLen : 16;

      const xorData1 = new Uint8Array(16);
      xorData1.fill(0);
      this.blockCopy(data, byteIdx, xorData1, 0, tmpLen);

      const aesKey = this.aesEcbEncrypt(aesEncData, this._sha1_key);
      const xorData2 = new Uint8Array(16);
      this.blockCopy(aesKey, 0, xorData2, 0, 16);

      const xorData = this.xor16(xorData1, xorData2);
      this.blockCopy(xorData, 0, result, byteIdx, tmpLen);

      payloadLen -= tmpLen;
      byteIdx += tmpLen;
    }

    return result;
  }

  calcCrcFirstMsg(data) {
    let crc = 0;
    for (const v of data) crc = (crc + v) & 0xffff;
    crc = (~crc) & 0xffff;
    return new Uint8Array([
      crc & 0xff,
      (crc >>> 8) & 0xff
    ]);
  }

  calcCrcNextMsg(data, msgIt) {
    const aesEncData = new Uint8Array(16);
    aesEncData.fill(0);

    let payloadLen = data.length - 3;
    let byteIdx = 3;

    aesEncData[0] = 89;
    aesEncData[1] = (msgIt >>> 24) & 0xff;
    aesEncData[2] = (msgIt >>> 16) & 0xff;
    aesEncData[3] = (msgIt >>>  8) & 0xff;
    aesEncData[4] = (msgIt >>>  0) & 0xff;
    this.blockCopy(this._random_ble_data, 0, aesEncData, 5, 8);
    aesEncData[15] = payloadLen & 0xff;

    let aesKey = this.aesEcbEncrypt(aesEncData, this._sha1_key);
    let xorData2 = new Uint8Array(16);
    this.blockCopy(aesKey, 0, xorData2, 0, 16);

    const xorData1a = new Uint8Array(16);
    xorData1a.fill(0);
    this.blockCopy(data, 0, xorData1a, 0, 3);

    let xorData = this.xor16(xorData1a, xorData2);
    aesKey = this.aesEcbEncrypt(xorData, this._sha1_key);
    this.blockCopy(aesKey, 0, xorData2, 0, 16);

    while (payloadLen > 0) {
      const tmpLen = payloadLen <= 16 ? payloadLen : 16;

      const xorData1 = new Uint8Array(16);
      xorData1.fill(0);
      this.blockCopy(data, byteIdx, xorData1, 0, tmpLen);

      xorData = this.xor16(xorData1, xorData2);
      aesKey = this.aesEcbEncrypt(xorData, this._sha1_key);
      this.blockCopy(aesKey, 0, xorData2, 0, 16);

      payloadLen -= tmpLen;
      byteIdx += tmpLen;
    }

    aesEncData[0] = 1;
    aesEncData[15] = 0;

    aesKey = this.aesEcbEncrypt(aesEncData, this._sha1_key);

    const xorData1b = new Uint8Array(16);
    this.blockCopy(aesKey, 0, xorData1b, 0, 16);

    xorData = this.xor16(xorData1b, xorData2);
    return new Uint8Array([xorData[0], xorData[1], xorData[2], xorData[3]]);
  }

  decrypt(data) {
    if (!(data instanceof Uint8Array)) data = new Uint8Array(data);
    if (data.length < 9) throw new Error("Decrypt: Paket zu kurz");

    const decrypted = new Uint8Array(data.length - 6);
    this.blockCopy(data, 0, decrypted, 0, 3);

    let newMsgIt = this._msg_it >>> 0;
    if ((newMsgIt & 0x0008000) > 0 && ((data[data.length - 2] >>> 7) === 0)) {
      newMsgIt = (newMsgIt + 0x0010000) >>> 0;
    }

    newMsgIt =
      ((newMsgIt & 0xFFFF0000) >>> 0) +
      ((data[data.length - 2] << 8) >>> 0) +
      (data[data.length - 1] >>> 0);

    const payloadLen = data.length - 9;
    let payload = new Uint8Array(payloadLen);
    this.blockCopy(data, 3, payload, 0, payloadLen);

    if (newMsgIt === 0) {
      const payloadD = this.cryptoFirst(payload);
      const payloadE = this.cryptoFirst(payloadD);
      if (!equalsBytes(payloadE, payload)) {
        log("Decrypt-Hinweis: First-Block Reencrypt-Check nicht gleich");
      }

      payload = this.cryptoFirst(payload);
      this.blockCopy(payload, 0, decrypted, 3, payload.length);

      if (
        decrypted.length >= 23 &&
        decrypted[0] === 0x5A && decrypted[1] === 0xA5 && decrypted[2] === 0x1E &&
        decrypted[3] === 0x21 && decrypted[4] === 0x3E && decrypted[5] === 0x5B
      ) {
        this.blockCopy(decrypted, 7, this._random_ble_data, 0, 16);
        this.calcSha1Key(this._name, this._random_ble_data);
        log("Crypto: random_ble_data übernommen, SHA1-Key aktualisiert");
      }
    } else if (newMsgIt > 0 && newMsgIt > this._msg_it) {
      const payloadD = this.cryptoNext(payload, newMsgIt);
      const payloadE = this.cryptoNext(payloadD, newMsgIt);
      if (!equalsBytes(payloadE, payload)) {
        log("Decrypt-Hinweis: Next-Block Reencrypt-Check nicht gleich");
      }

      payload = this.cryptoNext(payload, newMsgIt);
      this.blockCopy(payload, 0, decrypted, 3, payload.length);

      if (
        decrypted.length >= 7 &&
        decrypted[0] === 0x5A && decrypted[1] === 0xA5 && decrypted[2] === 0x00 &&
        decrypted[3] === 0x21 && decrypted[4] === 0x3E && decrypted[5] === 0x5C &&
        decrypted[6] === 0x01
      ) {
        this.calcSha1Key(this._random_app_data, this._random_ble_data);
        log("Crypto: SHA1-Key auf app_random + ble_random umgestellt");
      }

      this._msg_it = newMsgIt >>> 0;
    }

    return decrypted;
  }

  encrypt(data) {
    if (!(data instanceof Uint8Array)) data = new Uint8Array(data);
    if (data.length < 3) throw new Error("Encrypt: Daten zu kurz");

    const encrypted = new Uint8Array(152);
    this.blockCopy(data, 0, encrypted, 0, 3);

    const payloadLen = data.length - 3;
    let payload = new Uint8Array(payloadLen);
    this.blockCopy(data, 3, payload, 0, payloadLen);

    if (this._msg_it === 0) {
      const crc = this.calcCrcFirstMsg(payload);
      payload = this.cryptoFirst(payload);

      this.blockCopy(payload, 0, encrypted, 3, payload.length);

      encrypted[payloadLen + 3] = 0;
      encrypted[payloadLen + 4] = 0;
      encrypted[payloadLen + 5] = crc[0];
      encrypted[payloadLen + 6] = crc[1];
      encrypted[payloadLen + 7] = 0;
      encrypted[payloadLen + 8] = 0;

      this._msg_it = (this._msg_it + 1) >>> 0;
      return encrypted.slice(0, payloadLen + 9);
    } else {
      this._msg_it = (this._msg_it + 1) >>> 0;

      const crc = this.calcCrcNextMsg(data, this._msg_it);
      payload = this.cryptoNext(payload, this._msg_it);

      this.blockCopy(payload, 0, encrypted, 3, payload.length);

      encrypted[payloadLen + 3] = crc[0];
      encrypted[payloadLen + 4] = crc[1];
      encrypted[payloadLen + 5] = crc[2];
      encrypted[payloadLen + 6] = crc[3];
      encrypted[payloadLen + 7] = (this._msg_it >>> 8) & 0xff;
      encrypted[payloadLen + 8] = this._msg_it & 0xff;

      if (
        data.length >= 23 &&
        data[0] === 0x5A && data[1] === 0xA5 && data[2] === 0x10 &&
        data[3] === 0x3E && data[4] === 0x21 && data[5] === 0x5C && data[6] === 0x00
      ) {
        this.blockCopy(data, 7, this._random_app_data, 0, 16);
        log("Crypto: random_app_data gespeichert");
      }

      return encrypted.slice(0, payloadLen + 9);
    }
  }
}

// =================== BLE-Stack ===================
let device = null;
let server = null;
let service = null;
let charA = null;
let charB = null;
let MsgCrypto = null;

async function connect() {
  try {
    if (!navigator.bluetooth) {
      throw new Error("Web Bluetooth wird in diesem Browser nicht unterstützt");
    }

    setStatus("Device wird gesucht...", "warn");
    $("btnConnect").disabled = true;

    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SHU_NRF_SERVICE] }],
      optionalServices: [SHU_NRF_SERVICE]
    });

    $("deviceName").textContent = device.name || "(unnamed)";
    device.addEventListener("gattserverdisconnected", onDisconnect);

    setStatus("BLE-Verbindung öffnen...", "warn");
    server = await device.gatt.connect();

    setStatus("Service laden...", "warn");
    service = await server.getPrimaryService(SHU_NRF_SERVICE);
    charA = await service.getCharacteristic(SHU_NRF_CHAR_A);
    charB = await service.getCharacteristic(SHU_NRF_CHAR_B);

    try {
      await charB.startNotifications();
      charB.addEventListener("characteristicvaluechanged", onNotify);
      log("Notifications auf CHAR_B gestartet");
    } catch (e) {
      log("startNotifications fehlgeschlagen: " + e.message);
    }

    $("btnDisconnect").disabled = false;
    $("btnSendPlain").disabled = false;
    $("btnSendEncrypted").disabled = false;
    $("pairingSection").hidden = false;

    MsgCrypto = new NinebotCrypto("NinebotBleApp");

    setStatus("✅ Verbunden – starte Pairing...", "");
    log("Device verbunden: " + (device.name || "(unnamed)"));
    startPairing();
  } catch (e) {
    setStatus("❌ Fehler", "error");
    log("Connect-Fehler: " + e.message);
    $("btnConnect").disabled = false;
  }
}

async function disconnect() {
  try {
    clearInterval(timer5c);
    timer5c = null;
    pairingFinished = false;

    if (charB) {
      try {
        charB.removeEventListener("characteristicvaluechanged", onNotify);
      } catch {}
      try {
        await charB.stopNotifications();
      } catch {}
    }

    if (device?.gatt?.connected) {
      device.gatt.disconnect();
    }
  } catch (e) {
    log("Disconnect-Fehler: " + e.message);
  } finally {
    onDisconnect();
  }
}

function onDisconnect() {
  clearInterval(timer5c);
  timer5c = null;
  pairingFinished = false;

  device = null;
  server = null;
  service = null;
  charA = null;
  charB = null;
  MsgCrypto = null;

  $("deviceName").textContent = "-";
  $("btnDisconnect").disabled = true;
  $("btnConnect").disabled = false;
  $("btnSendPlain").disabled = true;
  $("btnSendEncrypted").disabled = true;
  $("pairingSection").hidden = true;

  setStatus("Trennung", "");
  log("Device getrennt");
}

function onNotify(event) {
  const raw = new Uint8Array(event.target.value.buffer.slice(0));
  log("Raw NOTIFY: " + bytesToHex(raw));

  let decrypted = raw;
  if (MsgCrypto) {
    try {
      decrypted = MsgCrypto.decrypt(raw);
      log("Decrypted : " + bytesToHex(decrypted));
    } catch (e) {
      log("Decrypt-Fehler: " + e.message);
    }
  }

  try {
    handleReply(decrypted, raw);
  } catch (e) {
    log("handleReply-Fehler: " + e.message);
  }
}

async function writeBle(data) {
  if (!charA) throw new Error("Write-Characteristic nicht verfügbar");

  if (charA.writeValueWithoutResponse) {
    await charA.writeValueWithoutResponse(data);
  } else if (charA.writeValue) {
    await charA.writeValue(data);
  } else {
    throw new Error("Characteristic kann nicht geschrieben werden");
  }
}

async function sendPacketRaw(label, data) {
  await writeBle(data);
  log(`SEND RAW ${label}: ${bytesToHex(data)}`);
}

async function sendPacket(label, plaintext) {
  if (!MsgCrypto) throw new Error("Crypto nicht initialisiert");
  const encrypted = MsgCrypto.encrypt(plaintext);
  await writeBle(encrypted);
  log(`SEND ENC ${label}: PLAIN=${bytesToHex(plaintext)} | ENC=${bytesToHex(encrypted)}`);
}

// =================== Pairing-Logik ===================
let pairingState = 0;   // 0=initial, 1=5B-done, 2=5C-running, 3=5D-done
let pairingFinished = false;
let sn = null;          // 14 bytes
let key5c = null;       // 16 bytes random key
let timer5c = null;

function startPairing() {
  pairingState = 0;
  pairingFinished = false;
  sn = null;
  key5c = null;

  clearInterval(timer5c);
  timer5c = null;

  setPairingHtml(`
    <h3>Initialisierung</h3>
    <p>Starte 0x5B-Initialisierung …</p>
  `);

  send5B().catch(e => {
    log("send5B-Fehler: " + e.message);
    setPairingHtml(`<p>❌ 5B konnte nicht gesendet werden.</p>`, "error");
  });
}

async function send5B() {
  const data = hexToBytes("3e215b00");
  await sendPacketRaw("5B", data);
}

async function send5C() {
  const key = new Uint8Array(16);
  crypto.getRandomValues(key);
  key5c = key;

  const bundle = new Uint8Array([
    0x5A, 0xA5, 0x10, 0x3E, 0x21, 0x5C, 0x00,
    ...key5c
  ]);

  await sendPacket("5C", bundle);
}

async function send5D() {
  if (!sn || sn.length !== 14) {
    setPairingHtml(`
      <h3>Fehler</h3>
      <p>❌ S/N nicht empfangen – 5D wird übersprungen.</p>
    `, "error");
    return;
  }

  const bundle = new Uint8Array([
    0x5A, 0xA5, 0x0E, 0x3E, 0x21, 0x5D, 0x00,
    ...sn
  ]);

  log("Sende 5D dreimal");
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      sendPacket("5D", bundle).catch(e => log("send5D-Fehler: " + e.message));
    }, 500 + i * 800);
  }
}

function handleReply(data, raw) {
  const d = bytesToHex(data);
  const r = bytesToHex(raw);

  // 5B Antwort
  if (d.startsWith("213e5b") || d.includes("213e5b")) {
    log("5B-Antwort erkannt");

    // Versuche 14 Byte S/N zu extrahieren wie in deinem Code: data.slice(16, 30)
    if (data.length >= 30) {
      sn = data.slice(16, 30);
      log("S/N extrahiert: " + bytesToHex(sn));

      setPairingHtml(`
        <h3>5B erfolgreich</h3>
        <p>✅ S/N extrahiert.</p>
        <p>S/N: <code>${bytesToHex(sn)}</code></p>
        <p>Drücke jetzt den Power-Knopf am Scooter.</p>
        <p>5C wird jede Sekunde gesendet, bis die Bestätigung kommt.</p>
      `);
    } else {
      setPairingHtml(`
        <h3>5B empfangen</h3>
        <p>⚠ Antwort erkannt, aber S/N konnte nicht sicher extrahiert werden.</p>
        <p>Power-Knopf drücken. 5C wird trotzdem gesendet.</p>
      `, "warn");
    }

    pairingState = 1;

    clearInterval(timer5c);
    timer5c = setInterval(() => {
      if (!pairingFinished) {
        send5C().catch(e => log("5C-Loop Fehler: " + e.message));
      }
    }, 1000);

    return;
  }

  // 5C bestätigt
  if (
    d.startsWith("213e5c01") || d.includes("213e5c01") ||
    r.startsWith("213e5c01") || r.includes("213e5c01")
  ) {
    log("5C-01 erkannt (Power-Button bestätigt)");
    pairingState = 2;

    clearInterval(timer5c);
    timer5c = null;

    setPairingHtml(`
      <h3>5C bestätigt</h3>
      <p>✅ Power-Button wurde erkannt.</p>
      <p>Jetzt wird 5D gesendet …</p>
    `);

    send5D().catch(e => log("send5D-Fehler: " + e.message));
    return;
  }

  // 5D bestätigt / Pairing fertig
  if (
    d.startsWith("213e5d01") || d.includes("213e5d01") ||
    d.includes("5d01") ||
    r.startsWith("213e5d01") || r.includes("213e5d01")
  ) {
    log("5D-Bestätigung erkannt");
    pairingState = 3;
    pairingFinished = true;

    clearInterval(timer5c);
    timer5c = null;

    setPairingHtml(`
      <h3>Pairing abgeschlossen</h3>
      <p>✅ 5D bestätigt – Crypto-Link ist aktiv.</p>
      <p>Du kannst jetzt verschlüsselte Pakete senden.</p>
    `);

    setStatus("✅ Pairing abgeschlossen", "");
    return;
  }
}

// =================== UI Actions ===================
$("btnConnect").addEventListener("click", () => {
  connect().catch(e => log("Connect Fehler: " + e.message));
});

$("btnDisconnect").addEventListener("click", () => {
  disconnect().catch(e => log("Disconnect Fehler: " + e.message));
});

$("btnSendPlain").addEventListener("click", async () => {
  try {
    const data = hexToBytes($("payloadHex").value);
    if (!data.length) throw new Error("Bitte Hex eingeben");
    await sendPacketRaw("MANUAL-RAW", data);
  } catch (e) {
    log("Manual RAW Fehler: " + e.message);
  }
});

$("btnSendEncrypted").addEventListener("click", async () => {
  try {
    const data = hexToBytes($("payloadHex").value);
    if (!data.length) throw new Error("Bitte Hex eingeben");
    await sendPacket("MANUAL-ENC", data);
  } catch (e) {
    log("Manual ENC Fehler: " + e.message);
  }
});

log("App bereit");
</script>
